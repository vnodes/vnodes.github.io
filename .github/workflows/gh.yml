name: Build and Deploy to GH Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: |
          npx nx build client

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public/client/browser
          branch: gh-pages
          clean: true
