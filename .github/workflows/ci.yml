  #     - run: pnpm exec nx fix-ci
  #       if: always()

  deploy:
    runs-on: ubuntu-latest
    needs: main
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.8.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install --no-frozen-lockfile

      - name: Build client app
        run: >
          npx nx build client --localize=false
          npx nx build client --deleteOutputPath=false

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public/apps/client/browser
          branch: gh-pages
          clean: true
